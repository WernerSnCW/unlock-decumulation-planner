kind = "web"
previewPath = "/"
title = "Unlock Decumulation Planner"
version = "1.0.0"
id = "artifacts/decumulation-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25016
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/decumulation-planner run dev"

[services.env]
PORT = "25016"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/decumulation-planner", "run", "build"]
publicDir = "artifacts/decumulation-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
